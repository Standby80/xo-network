<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO Network - v15.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --xo-pink: #ff69b4; --xo-dark: #2d3436; --xo-bg: #f4f7f6; --xo-white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--xo-bg); margin: 0; padding-bottom: 110px; color: var(--xo-dark); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000; border-top: 1px solid #eee; }
        .nav-item { font-size: 0.7rem; font-weight: 700; color: #bbb; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--xo-pink); }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

        .card { background: var(--xo-white); border-radius: 25px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); margin-bottom: 15px; border: 1px solid #eee; }
        .btn { border: none; padding: 14px; border-radius: 18px; font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; background: var(--xo-pink); color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-dark { background: #444; }
        .btn-small { padding: 8px 12px; font-size: 0.7rem; border-radius: 10px; width: auto; }

        /* Lists */
        .list-container { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .item-card { background: #fff; border-radius: 18px; padding: 15px; border-left: 5px solid var(--xo-pink); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .msg-card { background: #fff; border-radius: 18px; padding: 15px; border-left: 5px solid #2d3436; margin-bottom: 10px; }
        
        input { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-size:0.8rem; font-weight:bold;">
        <div><span style="color:#2ecc71">●</span> XO LIVE</div>
        <div id="display-id" style="color:var(--xo-pink)">...</div>
    </div>

    <div id="view-wallet" class="view active">
        <div class="card" style="text-align:center;">
            <div style="font-size:0.7rem; color:#bbb;">SALDO</div>
            <div style="font-size:3.5rem; font-weight:800;" id="balance">1000</div>
            <button class="btn" onclick="openScanner()" style="margin-top:15px;">📤 SKICKA XO</button>
            <button class="btn btn-dark" onclick="showReceiveQR()" style="margin-top:10px;">📥 TA EMOT</button>
        </div>
    </div>

    <div id="view-grid" class="view">
        <h3>Griden 🌍</h3>
        <div id="grid-container" class="list-container"></div>
        <input type="text" id="grid-input" placeholder="Skriv något...">
        <button class="btn" onclick="postAction('grid')">PUBLICERA</button>
    </div>

    <div id="view-help" class="view">
        <h3>Handtaget 🤝</h3>
        <div id="help-container" class="list-container"></div>
        <div class="card" style="border: 2px dashed #ddd; background:transparent;">
            <input type="text" id="help-input" placeholder="Vad behöver du hjälp med?">
            <button class="btn" onclick="postAction('help')">BE OM HJÄLP</button>
        </div>
    </div>

    <div id="view-inbox" class="view">
        <h3>Inkorgen 📥</h3>
        <div id="inbox-container" class="list-container"></div>
        <p style="font-size:0.7rem; color:#999; text-align:center;">Här ser du personer som vill hjälpa dig.</p>
    </div>
</div>

<div id="qr-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; flex-direction:column; align-items:center; justify-content:center;" onclick="this.style.display='none'">
    <div id="qrcode" style="background:white; padding:20px; border-radius:20px;"></div>
    <div id="reader" style="width:300px;"></div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-wallet" onclick="switchView('wallet')"><span class="nav-icon">💎</span>Plånbok</div>
    <div class="nav-item" id="nav-grid" onclick="switchView('grid')"><span class="nav-icon">🌍</span>Griden</div>
    <div class="nav-item" id="nav-help" onclick="switchView('help')"><span class="nav-icon">🤝</span>Handtaget</div>
    <div class="nav-item" id="nav-inbox" onclick="switchView('inbox')"><span class="nav-icon">📥</span>Inkorgen</div>
</div>

<script>
    const SUPABASE_URL = 'https://pwittnltsbtojzkhovos.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_HmgEfk5xCUfFS_RNPlZ3RA_6qmNxizl';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let myID = localStorage.getItem('xo_id') || 'XO-' + Math.random().toString(36).substr(2, 4).toUpperCase();
    let balance = parseFloat(localStorage.getItem('xo_bal')) || 1000;
    localStorage.setItem('xo_id', myID);

    // --- FUNKTIONER ---
    function render(t) {
        let containerId = t.type === 'help' ? 'help-container' : 'grid-container';
        if (t.type === 'msg' && t.target_id === myID) containerId = 'inbox-container';
        if (t.type === 'msg' && t.target_id !== myID) return; // Inte till mig

        const container = document.getElementById(containerId);
        if(!container) return;

        const el = document.createElement('div');
        el.className = t.type === 'msg' ? 'msg-card' : 'item-card';
        
        const isMine = t.author_id === myID;
        const btnHtml = isMine ? `<button class="btn btn-small btn-dark" style="background:#ff7675" onclick="deleteItem('${t.id}')">Ta bort</button>` : 
                        (t.type === 'help' ? `<button class="btn btn-small btn-dark" onclick="sendInterest('${t.author_id}', '${t.title}')">Jag hjälper!</button>` : '');

        el.innerHTML = `
            <div style="font-size:0.6rem; display:flex; justify-content:space-between; margin-bottom:5px;">
                <span style="color:var(--xo-pink)">${t.author_id}</span>
                <span style="color:#ccc">${new Date(t.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            </div>
            <div style="font-weight:600;">${t.title}</div>
            <div style="margin-top:10px;">${btnHtml}</div>
        `;
        container.prepend(el);
    }

    async function postAction(type, target = null, customTitle = null) {
        const input = document.getElementById(type + '-input');
        const title = customTitle || input.value;
        if(!title) return;
        await supabase.from('tasks').insert([{ title, author_id: myID, type, target_id: target }]);
        if(input) input.value = "";
    }

    async function sendInterest(authorId, taskTitle) {
        if(!confirm("Vill du skicka ett meddelande till " + authorId + "?")) return;
        await postAction('msg', authorId, `Jag vill hjälpa dig med: "${taskTitle}"`);
        alert("Meddelande skickat! Kolla Inkorgen för svar.");
    }

    async function deleteItem(id) {
        await supabase.from('tasks').delete().eq('id', id);
        location.reload(); 
    }

    // --- SYSTEM ---
    function switchView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
    }

    supabase.channel('custom-all-channel')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tasks' }, p => render(p.new))
    .subscribe();

    supabase.from('tasks').select('*').order('created_at', { ascending: true }).then(({data}) => {
        if(data) data.forEach(render);
    });

    document.getElementById('display-id').innerText = myID;
    document.getElementById('balance').innerText = Math.floor(balance);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
