<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO Network - v10.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --xo-pink: #ff69b4; --xo-dark: #2d3436; --xo-bg: #f9f9f9; --xo-white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--xo-bg); margin: 0; padding-bottom: 90px; color: var(--xo-dark); }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Wallet Cards */
        .card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; position: relative; }
        .balance-label { font-weight: 900; color: var(--xo-pink); letter-spacing: 2px; font-size: 0.7rem; text-transform: uppercase; }
        .balance-val { font-size: 4rem; font-weight: 800; margin: 10px 0; color: #333; letter-spacing: -2px; }
        
        /* Entropy Bar */
        .progress-bg { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--xo-pink); border-radius: 10px; transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Buttons */
        .btn { border: none; padding: 18px; border-radius: 20px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; margin: 5px 0; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-pink { background: var(--xo-pink); color: white; }
        .btn-dark { background: var(--xo-dark); color: white; }
        .btn-outline { background: transparent; border: 2px solid #ddd; color: #888; font-size: 0.8rem; }

        /* Witness List */
        .witness-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .witness-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #fff; border-radius: 15px; margin-bottom: 8px; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .witness-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--xo-pink); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { font-size: 0.7rem; font-weight: bold; color: #ccc; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--xo-pink); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="view-wallet" class="view active">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="balance-label">Din Kraft</div>
                <div id="node-badge" style="font-size: 0.5rem; background: #eee; padding: 3px 8px; border-radius: 10px; color: #999;">OFFLINE</div>
            </div>
            <div class="balance-val" id="balance">1000</div>
            
            <div style="display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: bold; color: #aaa;">
                <span>SYSTEMHÄLSA</span>
                <span id="rust-percent">100%</span>
            </div>
            <div class="progress-bg">
                <div id="rust-bar" class="progress-fill" style="width: 100%;"></div>
            </div>
            <p style="font-size: 0.55rem; color: #bbb; line-height: 1.4;">ID: <strong id="display-id">...</strong> (Dela detta för att bli signerad)</p>
        </div>

        <div class="card" style="padding: 15px; border: 1px dashed var(--xo-pink);">
            <div class="balance-label" style="margin-bottom: 10px; font-size: 0.6rem;">Signera en granne (Ge tillit)</div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="target-id" placeholder="Grannens ID" style="flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ddd; font-size: 0.8rem; outline: none;">
                <button class="btn btn-pink" style="width: auto; padding: 10px 20px; margin: 0; font-size: 0.8rem;" onclick="signNeighbor()">SIGNERA</button>
            </div>
        </div>

        <div class="witness-section">
            <div class="balance-label" style="margin-bottom: 15px;">Dina Vittnen (Social Tillit)</div>
            <div id="witness-list-container">
                <p style="font-size: 0.7rem; color: #ccc; font-style: italic;">Inga vittnen än. Be en granne signera dig!</p>
            </div>
        </div>

        <button class="btn btn-outline" style="margin-top: 30px;" onclick="downloadBackup()">💾 EXPORTERA BACKUP</button>
    </div>

    <div id="view-grid" class="view">
        <h2 style="margin-top: 0;">Griden 🌍</h2>
        <div id="task-container" style="margin-bottom: 20px;"></div>
        <div class="card">
            <input type="text" id="task-input" placeholder="Vad händer i byn?" style="width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box;">
            <button class="btn btn-pink" style="margin:0" onclick="sendTask()">PUBLICERA</button>
        </div>
    </div>

</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-wallet" onclick="switchView('wallet')">💎 Plånbok</div>
    <div class="nav-item" id="nav-grid" onclick="switchView('grid')">🌍 Griden</div>
</div>

<script>
    // --- SUPABASE KONFIG ---
    const SUPABASE_URL = 'https://pwittnltsbtojzkhovos.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_HmgEfk5xCUfFS_RNPlZ3RA_6qmNxizl';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let myID = localStorage.getItem('xo_id') || 'XO-' + Math.random().toString(36).substr(2, 4).toUpperCase();
    let balance = parseFloat(localStorage.getItem('xo_bal')) || 1000;
    let lastActive = parseInt(localStorage.getItem('xo_last_active')) || Date.now();
    let witnesses = JSON.parse(localStorage.getItem('xo_witnesses')) || [];

    const channel = supabaseClient.channel('xo-global', { 
        config: { broadcast: { self: true }, presence: { key: myID } } 
    });

    function save() {
        localStorage.setItem('xo_id', myID);
        localStorage.setItem('xo_bal', balance);
        localStorage.setItem('xo_last_active', lastActive);
        localStorage.setItem('xo_witnesses', JSON.stringify(witnesses));
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(balance);
        document.getElementById('display-id').innerText = myID;
        renderWitnesses();
        applyEntropy();
    }

    // --- ENTROPI (HÄLSA) ---
    function applyEntropy() {
        const hoursPassed = (Date.now() - lastActive) / (1000 * 60 * 60);
        const health = Math.max(0, 100 - (hoursPassed * 0.5)).toFixed(1); // 0.5% rost per timme
        document.getElementById('rust-percent').innerText = health + "%";
        document.getElementById('rust-bar').style.width = health + "%";
    }

    // --- SOCIAL TILLIT (SIGNERING) ---
    function signNeighbor() {
        const target = document.getElementById('target-id').value.trim().toUpperCase();
        if(!target || target === myID) return alert("Ange ett giltigt ID (inte ditt eget)");
        
        channel.send({
            type: 'broadcast',
            event: 'witness-event',
            payload: { from: myID, to: target, timestamp: Date.now() }
        });
        
        alert("Signatur skickad till " + target + "!");
        document.getElementById('target-id').value = "";
        lastActive = Date.now(); // Att lita på någon ger dig hälsa!
        save();
    }

    function renderWitnesses() {
        const container = document.getElementById('witness-list-container');
        if(witnesses.length === 0) return;
        
        container.innerHTML = witnesses.map(w => `
            <div class="witness-item">
                <div class="witness-avatar">${w.substring(3,5)}</div>
                <div><strong>${w}</strong> har bekräftat din tillit.</div>
            </div>
        `).join('');
    }

    // --- NÄTVERKSLYSSNARE ---
    channel
    .on('presence', { event: 'sync' }, () => {
        const count = Object.keys(channel.presenceState()).length;
        document.getElementById('node-badge').innerText = count + " ONLINE";
        document.getElementById('node-badge').style.background = "#e3f9e5";
    })
    .on('broadcast', { event: 'witness-event' }, ({ payload }) => {
        if(payload.to === myID && !witnesses.includes(payload.from)) {
            witnesses.push(payload.from);
            lastActive = Date.now(); // Att bli signerad återställer din hälsa!
            alert("Du har blivit signerad av " + payload.from + "!");
            save();
        }
    })
    .on('broadcast', { event: 'new-task' }, ({ payload }) => {
        renderTask(payload);
    })
    .subscribe();

    // --- GRID & ÖVRIGT ---
    function sendTask() {
        const input = document.getElementById('task-input');
        if (!input.value) return;
        channel.send({ type: 'broadcast', event: 'new-task', payload: { title: input.value, from: myID, id: Date.now() } });
        input.value = "";
        lastActive = Date.now();
        save();
    }

    function renderTask(data) {
        const container = document.getElementById('task-container');
        const el = document.createElement('div');
        el.className = 'card';
        el.style.padding = '15px';
        el.innerHTML = `<strong style="color:var(--xo-pink)">${data.from}:</strong> ${data.title}`;
        container.prepend(el);
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
    }

    function downloadBackup() {
        const data = { id: myID, bal: balance, witnesses: witnesses, secret: "XO_V10" };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `XO_Vault_${myID}.json`;
        a.click();
    }

    updateUI();
    setInterval(applyEntropy, 60000); // Uppdatera rosten varje minut
</script>
</body>
</html>
