<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO Network - v4.5</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --xo-pink: #ff69b4; --xo-dark: #2d3436; --xo-bg: #f9f9f9; --xo-white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--xo-bg); margin: 0; padding-bottom: 90px; color: var(--xo-dark); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--xo-white); display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { font-size: 0.7rem; font-weight: bold; color: #ccc; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--xo-pink); }
        .nav-icon { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }
        .balance-val { font-size: 3.5rem; font-weight: 800; text-align: center; color: #333; }
        .btn { border: none; padding: 16px; border-radius: 18px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; margin: 8px 0; }
        .btn-main { background: var(--xo-pink); color: white; }
        .btn-sec { background: var(--xo-dark); color: white; }
        .task-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 12px; border-left: 6px solid var(--xo-pink); box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-right: 5px; transition: 0.5s; }
        .online { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .error { background: #e74c3c; }
        #debug-log { font-size: 0.6rem; color: #999; margin-top: 10px; text-align: left; background: #eee; padding: 5px; border-radius: 10px; max-height: 50px; overflow-y: auto; display: none; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="view-wallet" class="view active">
        <div class="card">
            <div style="font-weight: 900; color: var(--xo-pink); letter-spacing: 2px; font-size: 0.7rem;">XO CORE</div>
            <div class="balance-val" id="balance">1000</div>
            <div style="text-align: center; color: #aaa; font-weight: bold;">XO CREDITS</div>
        </div>
        <button class="btn btn-main" onclick="openScanner()">SKANNA & TA EMOT</button>
        <button class="btn btn-sec" onclick="showQR()">GE BORT 50 XO</button>
    </div>

    <div id="view-grid" class="view">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin:0;">Griden 🌍</h2>
            <div id="net-status" style="font-size: 0.6rem; color: #999;"><span class="status-dot" id="dot"></span>ANSLUTER...</div>
        </div>
        
        <div id="task-container"></div>

        <div class="card" style="margin-top: 30px; border-style: dashed; background: #fafafa;">
            <input type="text" id="task-input" placeholder="Vad behöver du hjälp med?" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 1rem;">
            <button class="btn btn-main" style="margin: 0;" onclick="postTask()">LÄGG UPP PÅ GRIDEN</button>
        </div>
        <div id="debug-log"></div>
    </div>

</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-wallet" onclick="switchView('wallet')"><span class="nav-icon">💎</span>Plånbok</div>
    <div class="nav-item" id="nav-grid" onclick="switchView('grid')"><span class="nav-icon">🌍</span>Griden</div>
</div>

<script>
    // --- ULTRA CONNECT LOGIK ---
    const log = (msg) => {
        const d = document.getElementById('debug-log');
        d.style.display = 'block';
        d.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
        console.log(msg);
    };

    // Vi använder nu HTTPS-säkrade noder som fungerar bra med GitHub
    const peers = [
        'https://gun-manhattan.herokuapp.com/gun',
        'https://peer.wall.org/gun',
        'https://dletta.herokuapp.com/gun'
    ];
    
    log("Initierar Gun nätverk...");
    const gun = Gun({ peers: peers, localStorage: true, radisk: false });
    const gridTasks = gun.get('xo_grid_final_test_01');

    let balance = parseFloat(localStorage.getItem('xo_bal')) || 1000;
    let myID = localStorage.getItem('xo_peer_id') || 'ID_' + Math.random().toString(36).substr(2, 4);
    localStorage.setItem('xo_peer_id', myID);

    function save() {
        localStorage.setItem('xo_bal', balance);
        document.getElementById('balance').innerText = Math.floor(balance);
    }

    // Status-lyssnare
    gun.on('hi', (peer) => {
        log("Ansluten till nod: " + peer.url);
        document.getElementById('dot').className = "status-dot online";
        document.getElementById('net-status').innerText = "GRIDEN ONLINE";
        document.getElementById('net-status').style.color = "#2ecc71";
    });

    gun.on('bye', (peer) => {
        log("Tappade kontakt med nod.");
        document.getElementById('dot').className = "status-dot";
    });

    // --- GRID FUNKTIONER ---
    function postTask() {
        const input = document.getElementById('task-input');
        if(!input.value) return;
        const id = 'T' + Date.now();
        gridTasks.get(id).put({
            title: input.value,
            creator: myID,
            status: 'open',
            time: Date.now()
        });
        log("Skickade uppgift: " + input.value);
        input.value = "";
    }

    gridTasks.map().on((data, id) => {
        if(!data || data.status !== 'open') {
            if(document.getElementById(id)) document.getElementById(id).remove();
            return;
        }
        if(document.getElementById(id)) return;

        const container = document.getElementById('task-container');
        const el = document.createElement('div');
        el.id = id;
        el.className = 'task-card';
        el.innerHTML = `<div class="task-content"><h4>${data.title}</h4><p>Av: ${data.creator}</p></div><button class="btn-take" onclick="claimTask('${id}')">HJÄLP</button>`;
        container.prepend(el);
    });

    function claimTask(id) {
        if(confirm("Hjälpa till?")) {
            gridTasks.get(id).put({ status: 'claimed' });
            log("Tog uppdrag: " + id);
        }
    }

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
    }

    save();
</script>
</body>
</html>
