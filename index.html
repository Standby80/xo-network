<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO Network - v14.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --xo-pink: #ff69b4; --xo-dark: #2d3436; --xo-bg: #f4f7f6; --xo-white: #ffffff; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--xo-bg); margin: 0; padding-bottom: 110px; color: var(--xo-dark); overflow-x: hidden; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000; border-top: 1px solid #eee; }
        .nav-item { font-size: 0.7rem; font-weight: 700; color: #bbb; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--xo-pink); }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        /* Views */
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* Wallet Cards */
        .card { background: var(--xo-white); border-radius: 30px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); margin-bottom: 15px; border: 1px solid #eee; }
        .balance-val { font-size: 4rem; font-weight: 800; text-align: center; margin: 10px 0; letter-spacing: -3px; }
        
        /* Status Header */
        .status-area { background: #2d3436; padding: 14px; border-radius: 20px; color: #fff; font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #2ecc71; box-shadow: 0 0 10px #2ecc71; display: inline-block; margin-right: 6px; }

        /* Buttons */
        .btn { border: none; padding: 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; background: var(--xo-pink); color: white; display: flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box; }
        .btn:active { transform: scale(0.98); }
        .btn-dark { background: #444; color: #fff; }

        /* Grid Log/Chat Styling */
        #grid-container { 
            height: 350px; 
            overflow-y: auto; 
            background: #eee; 
            border-radius: 25px; 
            padding: 15px; 
            margin-bottom: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            border: 1px inset rgba(0,0,0,0.05);
        }

        .task-card { 
            background: #fff; 
            border-radius: 15px; 
            padding: 12px 16px; 
            border-left: 5px solid var(--xo-pink); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            font-size: 0.9rem;
            flex-shrink: 0;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        input { width: 100%; padding: 16px; border-radius: 18px; border: 1px solid #ddd; margin-bottom: 12px; outline: none; font-size: 1rem; }

        #qr-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: white; }
        #reader { width: 100%; max-width: 350px; border-radius: 20px; overflow: hidden; background: white; }
        #qr-canvas-container { background: white; padding: 20px; border-radius: 25px; min-width: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-area">
        <div><span id="status-dot" class="dot"></span><span id="net-text">NÄTVERK SÄKRAT</span></div>
        <div id="node-count" style="font-weight: 900; color: var(--xo-pink);">0 ONLINE</div>
    </div>

    <div id="view-wallet" class="view active">
        <div class="card">
            <span style="font-size:0.65rem; font-weight:800; color:#bbb; text-transform:uppercase;">Social Kraft</span>
            <div class="balance-val" id="balance">1000</div>
            <div style="height: 8px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden;">
                <div id="rust-bar" style="height: 100%; background: var(--xo-pink); width: 100%; transition: 1s;"></div>
            </div>
            <p style="font-size: 0.6rem; color: #ccc; text-align:center; font-family: monospace;">ID: <span id="display-id">...</span></p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px;">
            <button class="btn" onclick="openScanner()">📤 SKICKA</button>
            <button class="btn btn-dark" onclick="showReceiveQR()">📥 TA EMOT</button>
        </div>
        
        <div class="card" style="background:#2d3436; color:white;">
            <h4 style="margin:0 0 15px;">Backup & Säkerhet</h4>
            <button class="btn btn-dark" style="font-size:0.75rem; border: 1px solid #555;" onclick="downloadBackup()">💾 EXPORTERA PLÅNBOK</button>
            <label class="btn btn-dark" style="margin-top:10px; font-size:0.75rem; border: 1px solid #555; cursor:pointer;">
                📥 ÅTERSTÄLL FRÅN FIL
                <input type="file" id="restore-file" style="display:none;" onchange="restoreBackup(event)">
            </label>
        </div>
    </div>

    <div id="view-grid" class="view">
        <h3 style="margin-bottom:15px;">Griden 🌍</h3>
        <div id="grid-container"></div>
        <div class="card" style="border-style: dashed; background: transparent; padding: 15px;">
            <input type="text" id="grid-input" placeholder="Skriv ett meddelande...">
            <button class="btn" onclick="sendToDatabase()">PUBLICERA</button>
        </div>
    </div>

    <div id="view-family" class="view"><h3>Familjen 🧸</h3><div class="card">Hushållslogg kommer snart...</div></div>
    <div id="view-market" class="view"><h3>Torget 🏪</h3><div class="card">Lokala erbjudanden kommer snart...</div></div>
</div>

<div id="qr-overlay" onclick="closeQR()">
    <div id="qr-canvas-container" onclick="event.stopPropagation()">
        <div id="reader"></div> 
        <div id="qrcode" style="display: flex; justify-content: center;"></div> 
        <h3 id="qr-title" style="color:#333; text-align:center; margin-top:15px; font-size: 1.1rem;">Skanna</h3>
        <p id="qr-desc" style="color:#666; text-align:center; font-size:0.75rem;">Klicka utanför för att stänga</p>
        <button class="btn btn-dark" style="margin-top:15px;" onclick="closeQR()">STÄNG</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-wallet" onclick="switchView('wallet')"><span class="nav-icon">💎</span>Plånbok</div>
    <div class="nav-item" id="nav-grid" onclick="switchView('grid')"><span class="nav-icon">🌍</span>Griden</div>
    <div class="nav-item" id="nav-family" onclick="switchView('family')"><span class="nav-icon">🧸</span>Familj</div>
    <div class="nav-item" id="nav-market" onclick="switchView('market')"><span class="nav-icon">🏪</span>Torget</div>
</div>

<script>
    const SUPABASE_URL = 'https://pwittnltsbtojzkhovos.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_HmgEfk5xCUfFS_RNPlZ3RA_6qmNxizl';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let myID = localStorage.getItem('xo_id') || 'XO-' + Math.random().toString(36).substr(2, 4).toUpperCase();
    let balance = parseFloat(localStorage.getItem('xo_bal')) || 1000;
    let lastActive = Date.now();
    localStorage.setItem('xo_id', myID);

    const channel = supabaseClient.channel('xo-global-v14', { config: { broadcast: { self: true }, presence: { key: myID } } });

    // --- QR & TRANSACTION ---
    function showReceiveQR() {
        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = "";
        document.getElementById('reader').style.display = "none";
        qrDiv.style.display = "block";
        document.getElementById('qr-overlay').style.display = "flex";
        document.getElementById('qr-title').innerText = "Ditt Mottagar-ID";
        new QRCode(qrDiv, { text: "XO_ADDR_" + myID, width: 220, height: 220 });
    }

    let html5QrCode;
    function openScanner() {
        document.getElementById('qrcode').style.display = "none";
        document.getElementById('reader').style.display = "block";
        document.getElementById('qr-overlay').style.display = "flex";
        document.getElementById('qr-title').innerText = "Rikta kameran";

        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            handleScannedCode(decodedText);
            closeQR();
        });
    }

    function handleScannedCode(text) {
        if (text.startsWith("XO_ADDR_")) {
            const targetID = text.replace("XO_ADDR_", "");
            const amount = prompt("Hur mycket XO vill du skicka till " + targetID + "?", "50");
            if (amount && balance >= parseFloat(amount)) {
                balance -= parseFloat(amount);
                channel.send({ type: 'broadcast', event: 'transfer', payload: { to: targetID, from: myID, amount: amount } });
                updateUI();
                alert("Överfört " + amount + " XO!");
            } else { alert("Saldot räcker inte!"); }
        }
    }

    function closeQR() {
        if (html5QrCode) { html5QrCode.stop().catch(() => {}); html5QrCode = null; }
        document.getElementById('qr-overlay').style.display = "none";
    }

    // --- SYSTEM & DB ---
    channel.on('presence', { event: 'sync' }, () => {
        document.getElementById('node-count').innerText = Object.keys(channel.presenceState()).length + " ONLINE";
    })
    .on('broadcast', { event: 'transfer' }, ({ payload }) => {
        if (payload.to === myID) {
            balance += parseFloat(payload.amount);
            updateUI();
            alert("Du tog emot " + payload.amount + " XO!");
        }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tasks' }, payload => renderTask(payload.new))
    .subscribe();

    async function sendToDatabase() {
        const input = document.getElementById('grid-input');
        if(!input.value) return;
        await supabaseClient.from('tasks').insert([{ title: input.value, author_id: myID }]);
        input.value = "";
    }

    function renderTask(t) {
        const container = document.getElementById('grid-container');
        const el = document.createElement('div');
        el.className = 'task-card';
        el.innerHTML = `<strong style="color:var(--xo-pink); font-size:0.75rem;">${t.author_id}</strong><br>${t.title}`;
        container.appendChild(el); // Lägger till i slutet för chattrum-känsla
        
        // Auto-scroll till botten
        container.scrollTop = container.scrollHeight;
    }

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(balance);
        document.getElementById('display-id').innerText = myID;
        localStorage.setItem('xo_bal', balance);
        const hours = (Date.now() - lastActive) / (1000 * 60 * 60);
        document.getElementById('rust-bar').style.width = Math.max(0, 100 - (hours * 0.5)) + "%";
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
        
        // Om vi växlar till Griden, scrolla till botten direkt
        if(v === 'grid') {
            const c = document.getElementById('grid-container');
            c.scrollTop = c.scrollHeight;
        }
    }

    function downloadBackup() {
        const blob = new Blob([JSON.stringify({ id: myID, bal: balance })], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `XO_${myID}.json`; a.click();
    }

    function restoreBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if(data.id) {
                    myID = data.id; balance = data.bal;
                    localStorage.setItem('xo_id', myID); localStorage.setItem('xo_bal', balance);
                    updateUI(); alert("Plånbok återställd!"); location.reload();
                }
            } catch(err) { alert("Felaktig fil."); }
        };
        reader.readAsText(file);
    }

    // Hämta historik och rendera
    supabaseClient.from('tasks').select('*').order('created_at', { ascending: true }).then(({data}) => {
        if(data) {
            data.forEach(renderTask);
            const c = document.getElementById('grid-container');
            c.scrollTop = c.scrollHeight;
        }
    });

    updateUI();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
