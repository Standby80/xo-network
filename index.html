<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO Network - v4.9</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --xo-pink: #ff69b4; --xo-dark: #2d3436; --xo-bg: #f9f9f9; --xo-white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--xo-bg); margin: 0; padding-bottom: 90px; color: var(--xo-dark); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--xo-white); display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { font-size: 0.7rem; font-weight: bold; color: #ccc; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--xo-pink); }
        .nav-icon { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }
        .balance-val { font-size: 3.5rem; font-weight: 800; text-align: center; color: #333; }
        .btn { border: none; padding: 16px; border-radius: 18px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; margin: 8px 0; transition: 0.2s; }
        .btn-main { background: var(--xo-pink); color: white; }
        .task-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 12px; border-left: 6px solid var(--xo-pink); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .status-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #2d3436; padding: 10px 15px; border-radius: 15px; font-size: 0.65rem; font-weight: bold; color: #fff; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; display: inline-block; margin-right: 5px; }
        .online-dot { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="view-wallet" class="view active">
        <div class="card">
            <div style="font-weight: 900; color: var(--xo-pink); letter-spacing: 2px; font-size: 0.7rem;">XO CORE</div>
            <div class="balance-val" id="balance">1000</div>
            <div style="text-align: center; color: #aaa; font-weight: bold;">XO CREDITS</div>
        </div>
        <button class="btn btn-main" onclick="openScanner()">SKANNA & TA EMOT</button>
        <button class="btn btn-main" style="background:var(--xo-dark)" onclick="showQR()">GE BORT 50 XO</button>
        <div id="reader" style="display:none; width:100%; border-radius:20px; overflow:hidden; margin-top:10px;"></div>
        <div id="qrcode-out" style="display:none; text-align:center; padding:15px; background:white; border-radius:20px; border:2px solid var(--xo-pink); margin-top:10px;"></div>
    </div>

    <div id="view-grid" class="view">
        <div class="status-area">
            <div><span id="dot" class="dot"></span><span id="net-text">SÖKER...</span></div>
            <div><span id="online-count" style="color:var(--xo-pink); font-size: 1rem;">1</span> <span style="opacity: 0.7;">AKTIVA NODER</span></div>
        </div>
        
        <div id="task-container"></div>

        <div class="card" style="margin-top: 20px; border-style: dashed; background: #fafafa;">
            <input type="text" id="task-input" placeholder="Vad behöver du hjälp med?" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box;">
            <button class="btn btn-main" style="margin:0;" onclick="postTask()">SKICKA TILL GRIDEN</button>
        </div>
        
        <button onclick="location.reload()" style="background:none; border:none; color:#ccc; font-size:0.6rem; margin-top:20px; width:100%;">TVINGA NY ANSLUTNING (SYNC)</button>
    </div>

</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-wallet" onclick="switchView('wallet')"><span class="nav-icon">💎</span>Plånbok</div>
    <div class="nav-item" id="nav-grid" onclick="switchView('grid')"><span class="nav-icon">🌍</span>Griden</div>
</div>

<script>
    // --- KRAFTFULLARE NOD-UPPSÄTTNING ---
    const gun = Gun({
        peers: [
            'https://gun-manhattan.herokuapp.com/gun',
            'https://relay.peer.ooo/gun',
            'https://gun-us.herokuapp.com/gun',
            'https://gunjs.herokuapp.com/gun'
        ],
        localStorage: true,
        retry: 1000 // Försök igen snabbare om det bryts
    });

    // NY KANAL FÖR ATT UNDVIKA GAMMAL DATA
    const worldGrid = gun.get('xo_mesh_v4_9_final');
    const heartbeats = gun.get('xo_heartbeat_v4_9');

    let balance = parseFloat(localStorage.getItem('xo_bal')) || 1000;
    let myID = localStorage.getItem('xo_peer_id') || 'Node_' + Math.random().toString(36).substr(2, 4);
    localStorage.setItem('xo_peer_id', myID);

    function save() {
        localStorage.setItem('xo_bal', balance);
        document.getElementById('balance').innerText = Math.floor(balance);
    }

    // --- HEARTBEAT LOGIK ---
    setInterval(() => {
        heartbeats.get(myID).put({ lastSeen: Date.now() });
    }, 3000); // Skicka oftare för snabbare upptäckt

    let activeNodes = {};
    heartbeats.map().on((data, id) => {
        if (data && data.lastSeen > Date.now() - 10000) {
            activeNodes[id] = true;
        } else {
            delete activeNodes[id];
        }
        const count = Object.keys(activeNodes).length;
        document.getElementById('online-count').innerText = count;
        
        // Om vi ser mer än oss själva, bekräfta i texten
        if(count > 1) {
            document.getElementById('net-text').innerText = "NÄTVERK SÄKRAT (MESH)";
        }
    });

    gun.on('hi', () => {
        document.getElementById('dot').className = "dot online-dot";
        if(Object.keys(activeNodes).length <= 1) {
            document.getElementById('net-text').innerText = "ONLINE (ENSAM)";
        }
    });

    // --- GRID LOGIK ---
    function postTask() {
        const val = document.getElementById('task-input').value;
        if(!val) return;
        // Vi sparar med tidsstämpel som nyckel för att sortera
        worldGrid.get('T_'+Date.now()).put({ title: val, from: myID, status: 'open' });
        document.getElementById('task-input').value = "";
    }

    worldGrid.map().on((data, id) => {
        if(!data || data.status !== 'open' || document.getElementById(id)) return;
        const el = document.createElement('div');
        el.id = id;
        el.className = 'task-card';
        el.innerHTML = `<div><h4>${data.title}</h4><p>Från: ${data.from}</p></div><button class="btn" style="width:auto; padding:8px 12px; font-size:0.7rem; background:var(--xo-pink); color:white;" onclick="claim('${id}')">TA</button>`;
        document.getElementById('task-container').prepend(el);
    });

    function claim(id) {
        if(confirm("Hjälpa till?")) {
            worldGrid.get(id).put({ status: 'claimed' });
            document.getElementById(id).remove();
        }
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
    }

    function openScanner() {
        const d = document.getElementById('reader'); d.style.display='block';
        const s = new Html5Qrcode("reader");
        s.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => {
            if(t.startsWith("XO_GIFT_")) { balance += 50; save(); s.stop(); d.style.display='none'; }
        });
    }

    function showQR() {
        const o = document.getElementById('qrcode-out'); o.innerHTML=""; o.style.display='block';
        QRCode.toCanvas(document.createElement('canvas'), "XO_GIFT_"+Math.random(), { width: 220 }, (e, c) => {
            o.appendChild(c); balance -= 50; save();
        });
    }

    save();
</script>
</body>
</html>
