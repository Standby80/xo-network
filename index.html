<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO Network - v14.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --xo-pink: #ff69b4; --xo-dark: #2d3436; --xo-bg: #f4f7f6; --xo-white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--xo-bg); margin: 0; padding-bottom: 110px; color: var(--xo-dark); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000; border-top: 1px solid #eee; }
        .nav-item { font-size: 0.7rem; font-weight: 700; color: #bbb; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--xo-pink); }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* Cards & UI */
        .card { background: var(--xo-white); border-radius: 30px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); margin-bottom: 15px; border: 1px solid #eee; }
        .balance-val { font-size: 4rem; font-weight: 800; text-align: center; margin: 10px 0; letter-spacing: -3px; }
        .status-area { background: #2d3436; padding: 14px; border-radius: 20px; color: #fff; font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #2ecc71; box-shadow: 0 0 10px #2ecc71; display: inline-block; margin-right: 6px; }
        .btn { border: none; padding: 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; background: var(--xo-pink); color: white; display: flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box; }
        .btn:active { transform: scale(0.98); }
        .btn-dark { background: #444; color: #fff; }

        /* Chat Containers */
        .log-box { height: 380px; overflow-y: auto; background: rgba(0,0,0,0.03); border-radius: 25px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #eee; }
        .task-card { background: #fff; border-radius: 18px; padding: 12px 16px; border-left: 6px solid var(--xo-pink); box-shadow: 0 3px 10px rgba(0,0,0,0.03); font-size: 0.95rem; flex-shrink: 0; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .task-id { color: var(--xo-pink); font-weight: 800; font-size: 0.7rem; }
        .task-time { color: #ccc; font-size: 0.65rem; font-weight: 600; }

        input { width: 100%; padding: 16px; border-radius: 18px; border: 1px solid #ddd; margin-bottom: 12px; outline: none; font-size: 1rem; }
        #qr-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: white; }
        #reader, #qrcode { background: white; padding: 20px; border-radius: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-area">
        <div><span id="status-dot" class="dot"></span><span>NÄTVERK LIVE</span></div>
        <div id="node-count" style="font-weight: 900; color: var(--xo-pink);">0 ONLINE</div>
    </div>

    <div id="view-wallet" class="view active">
        <div class="card">
            <span style="font-size:0.65rem; font-weight:800; color:#bbb; text-transform:uppercase;">Social Kraft</span>
            <div class="balance-val" id="balance">1000</div>
            <p style="font-size: 0.6rem; color: #ccc; text-align:center; font-family: monospace;">ID: <span id="display-id">...</span></p>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="openScanner()">📤 SKICKA</button>
            <button class="btn btn-dark" onclick="showReceiveQR()">📥 TA EMOT</button>
        </div>
    </div>

    <div id="view-grid" class="view">
        <h3 style="margin-bottom:10px;">Griden 🌍</h3>
        <div id="grid-container" class="log-box"></div>
        <div class="card" style="border-style: dashed; background: transparent; padding: 15px;">
            <input type="text" id="grid-input" placeholder="Skriv till byn...">
            <button class="btn" onclick="sendToDatabase('grid')">PUBLICERA</button>
        </div>
    </div>

    <div id="view-family" class="view">
        <h3 style="margin-bottom:10px;">Handtaget 🤝</h3>
        <div id="help-container" class="log-box"></div>
        <div class="card" style="border: 2px solid var(--xo-pink); background: transparent; padding: 15px;">
            <input type="text" id="help-input" placeholder="Vad behöver du hjälp med?">
            <button class="btn btn-dark" onclick="sendToDatabase('help')">BE OM HJÄLP</button>
        </div>
    </div>

    <div id="view-market" class="view"><h3>Torget 🏪</h3><div class="card">Erbjudanden kommer...</div></div>
</div>

<div id="qr-overlay" onclick="closeQR()">
    <div style="background:white; padding:20px; border-radius:25px;" onclick="event.stopPropagation()">
        <div id="qrcode"></div>
        <div id="reader" style="display:none; width:300px;"></div>
        <button class="btn btn-dark" style="margin-top:15px;" onclick="closeQR()">STÄNG</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-wallet" onclick="switchView('wallet')"><span class="nav-icon">💎</span>Plånbok</div>
    <div class="nav-item" id="nav-grid" onclick="switchView('grid')"><span class="nav-icon">🌍</span>Griden</div>
    <div class="nav-item" id="nav-family" onclick="switchView('family')"><span class="nav-icon">🤝</span>Handtaget</div>
    <div class="nav-item" id="nav-market" onclick="switchView('market')"><span class="nav-icon">🏪</span>Torget</div>
</div>

<script>
    const SUPABASE_URL = 'https://pwittnltsbtojzkhovos.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_HmgEfk5xCUfFS_RNPlZ3RA_6qmNxizl';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let myID = localStorage.getItem('xo_id') || 'XO-' + Math.random().toString(36).substr(2, 4).toUpperCase();
    let balance = parseFloat(localStorage.getItem('xo_bal')) || 1000;
    localStorage.setItem('xo_id', myID);

    const channel = supabaseClient.channel('xo-global-v14', { config: { broadcast: { self: true }, presence: { key: myID } } });

    function renderTask(t) {
        // Sortering: Börjar det med 🤝 hamnar det i Handtaget, annars Griden.
        const isHelp = t.title.includes('🤝');
        const container = document.getElementById(isHelp ? 'help-container' : 'grid-container');
        if(!container) return;

        const el = document.createElement('div');
        el.className = 'task-card';
        const date = t.created_at ? new Date(t.created_at) : new Date();
        const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        el.innerHTML = `
            <div class="task-header">
                <span class="task-id">${t.author_id}</span>
                <span class="task-time">${timeStr}</span>
            </div>
            <div class="task-body">${t.title.replace('🤝', '')}</div>
        `;
        container.appendChild(el);
        container.scrollTop = container.scrollHeight;
    }

    async function sendToDatabase(source) {
        const input = document.getElementById(source === 'help' ? 'help-input' : 'grid-input');
        if(!input.value) return;
        
        // Lägg till 🤝 automatiskt om det kommer från Handtaget-fliken
        const finalTitle = source === 'help' ? '🤝 ' + input.value : input.value;
        
        const { error } = await supabaseClient.from('tasks').insert([{ title: finalTitle, author_id: myID }]);
        input.value = "";
    }

    channel.on('presence', { event: 'sync' }, () => {
        document.getElementById('node-count').innerText = Object.keys(channel.presenceState()).length + " ONLINE";
    })
    .on('broadcast', { event: 'transfer' }, ({ payload }) => {
        if (payload.to === myID) { balance += parseFloat(payload.amount); updateUI(); }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tasks' }, payload => renderTask(payload.new))
    .subscribe();

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(balance);
        document.getElementById('display-id').innerText = myID;
        localStorage.setItem('xo_bal', balance);
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
        // Auto-scroll när man byter flik
        const container = document.getElementById(v === 'family' ? 'help-container' : 'grid-container');
        if(container) container.scrollTop = container.scrollHeight;
    }

    // QR LOGIK (Samma som v14.4)
    function showReceiveQR() {
        const qrDiv = document.getElementById('qrcode'); qrDiv.innerHTML = "";
        document.getElementById('qr-overlay').style.display = "flex";
        new QRCode(qrDiv, { text: "XO_ADDR_" + myID, width: 200, height: 200 });
    }
    let html5QrCode;
    function openScanner() {
        document.getElementById('qr-overlay').style.display = "flex";
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if (text.startsWith("XO_ADDR_")) {
                const amount = prompt("XO att skicka?", "50");
                if (amount && balance >= amount) {
                    balance -= amount;
                    channel.send({ type: 'broadcast', event: 'transfer', payload: { to: text.replace("XO_ADDR_", ""), from: myID, amount } });
                    updateUI();
                }
            }
            closeQR();
        });
    }
    function closeQR() { if(html5QrCode) html5QrCode.stop(); document.getElementById('qr-overlay').style.display = "none"; }

    // Init: Hämta historik och sortera
    supabaseClient.from('tasks').select('*').order('created_at', { ascending: true }).then(({data}) => {
        if(data) data.forEach(renderTask);
    });

    updateUI();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
