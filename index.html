<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO Network - v8.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --xo-pink: #ff69b4; --xo-dark: #2d3436; --xo-bg: #f9f9f9; --xo-white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--xo-bg); margin: 0; padding-bottom: 90px; color: var(--xo-dark); }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Wallet Cards */
        .card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; position: relative; overflow: hidden; }
        .balance-label { font-weight: 900; color: var(--xo-pink); letter-spacing: 2px; font-size: 0.7rem; text-transform: uppercase; }
        .balance-val { font-size: 4rem; font-weight: 800; margin: 10px 0; color: #333; letter-spacing: -2px; }
        
        /* Stats Styling */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 15px; border-radius: 20px; border: 1px solid #eee; text-align: center; }
        .stat-val { display: block; font-weight: 800; font-size: 1.2rem; color: var(--xo-dark); }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; font-weight: bold; }

        /* Backup Section */
        .backup-box { background: #2d3436; color: white; border-radius: 25px; padding: 20px; margin-top: 20px; }
        .backup-text { font-size: 0.75rem; line-height: 1.4; opacity: 0.8; margin-bottom: 15px; }

        .btn { border: none; padding: 18px; border-radius: 20px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; margin: 5px 0; transition: 0.2s; }
        .btn-pink { background: var(--xo-pink); color: white; }
        .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.2); color: white; font-size: 0.8rem; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { font-size: 0.7rem; font-weight: bold; color: #ccc; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--xo-pink); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="view-wallet" class="view active">
        <div class="card">
            <div class="balance-label">Ditt Saldo</div>
            <div class="balance-val" id="balance">1000</div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <div style="width: 100%; height: 6px; background: #eee; border-radius: 10px;">
                    <div id="rust-bar" style="width: 98%; height: 100%; background: var(--xo-pink); border-radius: 10px;"></div>
                </div>
                <span style="font-size: 0.6rem; font-weight: bold; color: #aaa;">HÄLSA</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val">12</span>
                <span class="stat-label">Transaktioner</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" style="color: #2ecc71;">+250</span>
                <span class="stat-label">Vunnen Kraft</span>
            </div>
        </div>

        <button class="btn btn-pink" onclick="switchView('grid')">🌍 GÅ TILL GRIDEN</button>
        
        <div class="backup-box">
            <h4 style="margin: 0 0 10px 0; color: var(--xo-pink);">Säkra din framtid</h4>
            <p class="backup-text">
                I XO är du din egen bank. Det finns ingen "Glömt lösenord"-knapp. Om din telefon går sönder försvinner dina XO om du inte har en backup.
            </p>
            <button class="btn btn-outline" onclick="downloadBackup()">💾 LADDA NER SÄKERHETSKOPIA</button>
        </div>
    </div>

    <div id="view-grid" class="view">
        <h2 style="margin-top: 0;">Griden 🌍</h2>
        <div id="task-container" style="margin-bottom: 20px;"></div>
        <div class="card">
            <input type="text" id="task-input" placeholder="Vad händer i byn?" style="width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box;">
            <button class="btn btn-pink" style="margin:0" onclick="sendTask()">PUBLICERA</button>
        </div>
    </div>

</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-wallet" onclick="switchView('wallet')">💎 Plånbok</div>
    <div class="nav-item" id="nav-grid" onclick="switchView('grid')">🌍 Griden</div>
</div>

<script>
    // --- SUPABASE KONFIG ---
    const SUPABASE_URL = 'https://pwittnltsbtojzkhovos.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_HmgEfk5xCUfFS_RNPlZ3RA_6qmNxizl';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const myID = localStorage.getItem('xo_id') || 'User-' + Math.random().toString(36).substr(2, 4);
    localStorage.setItem('xo_id', myID);

    const channel = supabaseClient.channel('xo-global', { config: { broadcast: { self: true } } });

    // --- SALDO & BACKUP ---
    let balance = parseFloat(localStorage.getItem('xo_bal')) || 1000;

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(balance);
        localStorage.setItem('xo_bal', balance);
    }

    function downloadBackup() {
        const data = {
            id: myID,
            balance: balance,
            timestamp: new Date().toISOString(),
            info: "XO Network Backup - Förvara säkert"
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `xo_backup_${myID}.json`;
        a.click();
        alert("Säkerhetskopia nedladdad! Spara den på ett säkert ställe.");
    }

    // --- GRID LOGIK ---
    channel.on('broadcast', { event: 'new-task' }, ({ payload }) => {
        renderTask(payload);
    }).subscribe();

    function sendTask() {
        const input = document.getElementById('task-input');
        if (!input.value) return;
        channel.send({ type: 'broadcast', event: 'new-task', payload: { title: input.value, from: myID, id: Date.now() } });
        input.value = "";
    }

    function renderTask(data) {
        const container = document.getElementById('task-container');
        const el = document.createElement('div');
        el.className = 'card';
        el.style.padding = '15px';
        el.innerHTML = `<strong>${data.from}:</strong> ${data.title}`;
        container.prepend(el);
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
    }

    updateUI();
</script>
</body>
</html>
