<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XO Network - v13.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --xo-pink: #ff69b4; --xo-dark: #2d3436; --xo-bg: #f4f7f6; --xo-white: #ffffff; --xo-gray: #8e8e93; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--xo-bg); margin: 0; padding-bottom: 110px; color: var(--xo-dark); overflow-x: hidden; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 1000; border-top: 1px solid #eee; }
        .nav-item { font-size: 0.7rem; font-weight: 700; color: #bbb; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--xo-pink); }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

        /* Views */
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Status Header */
        .status-area { background: #2d3436; padding: 14px; border-radius: 20px; color: #fff; font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; display: inline-block; margin-right: 6px; }
        .online { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }

        /* Cards */
        .card { background: var(--xo-white); border-radius: 30px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); margin-bottom: 15px; border: 1px solid #eee; }
        .balance-val { font-size: 4rem; font-weight: 800; text-align: center; margin: 10px 0; letter-spacing: -3px; color: #1d1d1f; }
        
        /* Progress/Entropy */
        .progress-container { height: 8px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--xo-pink); transition: width 1s ease-in-out; }

        /* Task Grid */
        .task-card { background: #fff; border-radius: 22px; padding: 18px; margin-bottom: 15px; border-left: 6px solid var(--xo-pink); box-shadow: 0 5px 15px rgba(0,0,0,0.03); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        /* Buttons */
        .btn { border: none; padding: 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; background: var(--xo-pink); color: white; display: flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box; }
        .btn:active { transform: scale(0.97); }
        .btn-small { padding: 8px 14px; font-size: 0.7rem; border-radius: 12px; width: auto; margin-top: 0; }
        .btn-dark { background: #444; color: #fff; }

        input { width: 100%; padding: 16px; border-radius: 18px; border: 1px solid #ddd; margin-bottom: 12px; box-sizing: border-box; outline: none; font-size: 1rem; transition: 0.2s; }
        input:focus { border-color: var(--xo-pink); }

        .label-tiny { font-size: 0.65rem; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-area">
        <div><span id="dot" class="dot"></span><span id="net-text">ANSLUTER...</span></div>
        <div id="node-count" style="font-weight: 900; color: var(--xo-pink);">0 ONLINE</div>
    </div>

    <div id="view-wallet" class="view active">
        <div class="card">
            <span class="label-tiny">Social Kraft</span>
            <div class="balance-val" id="balance">1000</div>
            <div class="progress-container"><div id="rust-bar" class="progress-fill" style="width: 100%;"></div></div>
            <div style="display:flex; justify-content: space-between; font-size: 0.6rem; color: #aaa; font-weight: 700;">
                <span>ENTROPI (ROST)</span>
                <span id="rust-text">100% FRISK</span>
            </div>
            <p style="font-size: 0.65rem; color: #ccc; text-align:center; margin-top:20px; font-family: monospace;">ID: <span id="display-id">...</span></p>
        </div>
        
        <div class="card" style="background:#2d3436; color:white;">
            <h4 style="margin:0 0 15px;">Backup & Säkerhet</h4>
            <button class="btn btn-dark" onclick="downloadBackup()">💾 EXPORTERA PLÅNBOK</button>
            
            <label class="btn btn-dark" style="margin-top:10px; cursor:pointer;">
                📥 ÅTERSTÄLL FRÅN FIL
                <input type="file" id="restore-file" style="display:none;" onchange="restoreBackup(event)">
            </label>
        </div>
    </div>

    <div id="view-grid" class="view">
        <h3 style="margin: 0 0 15px;">Griden 🌍</h3>
        <div id="grid-container"></div>
        <div class="card" style="border-style: dashed; background: transparent; margin-top:20px; padding: 15px;">
            <input type="text" id="grid-input" placeholder="Behöver du hjälp med något?">
            <button class="btn" onclick="sendToDatabase()">PUBLICERA TILL BYN</button>
        </div>
    </div>

    <div id="view-family" class="view">
        <h3 style="margin:0 0 15px;">Familjen 🧸</h3>
        <div class="card">
            <span class="label-tiny">Dagens hushållssysslor</span>
            <div style="margin-top:15px;">
                <div style="display:flex; justify-content:space-between; align-items:center; padding: 12px 0; border-bottom: 1px solid #eee;">
                    <span>Diskmaskinen</span><span style="color:var(--xo-pink); font-weight:800;">+10 XO</span>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; padding: 12px 0;">
                    <span>Gå ut med soporna</span><span style="color:var(--xo-pink); font-weight:800;">+5 XO</span>
                </div>
            </div>
        </div>
    </div>

    <div id="view-market" class="view">
        <h3 style="margin:0 0 15px;">Torget 🏪</h3>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h4 style="margin:0">Lokala Bageriet</h4>
                    <p style="margin:5px 0 0; font-size:0.75rem; color:#888;">En gratis kanelbulle</p>
                </div>
                <button class="btn btn-small btn-dark">25 XO</button>
            </div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-wallet" onclick="switchView('wallet')"><span class="nav-icon">💎</span>Plånbok</div>
    <div class="nav-item" id="nav-grid" onclick="switchView('grid')"><span class="nav-icon">🌍</span>Griden</div>
    <div class="nav-item" id="nav-family" onclick="switchView('family')"><span class="nav-icon">🧸</span>Familj</div>
    <div class="nav-item" id="nav-market" onclick="switchView('market')"><span class="nav-icon">🏪</span>Torget</div>
</div>

<script>
    const SUPABASE_URL = 'https://pwittnltsbtojzkhovos.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_HmgEfk5xCUfFS_RNPlZ3RA_6qmNxizl';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let myID = localStorage.getItem('xo_id') || 'User-' + Math.random().toString(36).substr(2, 4).toUpperCase();
    let balance = parseFloat(localStorage.getItem('xo_bal')) || 1000;
    let lastActive = parseInt(localStorage.getItem('xo_last_active')) || Date.now();
    localStorage.setItem('xo_id', myID);

    // --- REALTID & STATUS ---
    const channel = supabaseClient.channel('xo-global', { config: { presence: { key: myID } } });

    channel
    .on('presence', { event: 'sync' }, () => {
        const state = channel.presenceState();
        document.getElementById('node-count').innerText = Object.keys(state).length + " ONLINE";
        document.getElementById('dot').className = "dot online";
        document.getElementById('net-text').innerText = "NÄTVERK SÄKRAT";
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tasks' }, payload => {
        renderTask(payload.new);
    })
    .subscribe(async (status) => {
        if (status === 'SUBSCRIBED') await channel.track({ online_at: new Date().toISOString() });
    });

    // --- DATABAS FUNKTIONER ---
    async function loadTasks() {
        const { data } = await supabaseClient.from('tasks').select('*').order('created_at', { ascending: true });
        if (data) {
            document.getElementById('grid-container').innerHTML = "";
            data.forEach(task => renderTask(task));
        }
    }

    async function sendToDatabase() {
        const input = document.getElementById('grid-input');
        if(!input.value) return;
        const { error } = await supabaseClient.from('tasks').insert([{ title: input.value, author_id: myID }]);
        if(error) alert("Fel vid publicering: " + error.message);
        input.value = "";
        lastActive = Date.now();
        updateUI();
    }

    function renderTask(task) {
        if(document.getElementById(task.id)) return;
        const container = document.getElementById('grid-container');
        const el = document.createElement('div');
        el.id = task.id;
        el.className = 'task-card';
        el.innerHTML = `
            <div style="font-size:0.95rem; font-weight:700; color:#1d1d1f; margin-bottom:10px;">${task.title}</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="label-tiny" style="font-size:0.55rem;">ID: ${task.author_id}</span>
                <button class="btn btn-small" onclick="helpNeighbor('${task.id}')">HJÄLP TILL (+5)</button>
            </div>
        `;
        container.prepend(el);
    }

    function helpNeighbor(taskId) {
        balance += 5;
        lastActive = Date.now();
        updateUI();
        alert("Snyggt! Du ställde upp för byn. +5 XO har lagts till ditt saldo.");
    }

    // --- UI SYSTEM ---
    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(balance);
        document.getElementById('display-id').innerText = myID;
        
        const hours = (Date.now() - lastActive) / (1000 * 60 * 60);
        const health = Math.max(0, 100 - (hours * 0.2)).toFixed(1);
        document.getElementById('rust-bar').style.width = health + "%";
        document.getElementById('rust-text').innerText = health + "% FRISK";
        
        localStorage.setItem('xo_bal', balance);
        localStorage.setItem('xo_last_active', lastActive);
    }

    function switchView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        document.getElementById('nav-'+v).classList.add('active');
    }

    // --- BACKUP & RESTORE ---
    function downloadBackup() {
        const data = { id: myID, bal: balance, ts: Date.now() };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `XO_Vault_${myID}.json`;
        a.click();
    }

    function restoreBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if(data.id) {
                    myID = data.id; balance = data.bal;
                    localStorage.setItem('xo_id', myID);
                    updateUI();
                    alert("Plånbok återställd!");
                    location.reload();
                }
            } catch(err) { alert("Ogiltig fil."); }
        };
        reader.readAsText(file);
    }

    loadTasks();
    updateUI();
    setInterval(updateUI, 30000); // Uppdatera rosten var 30:e sekund
</script>
</body>
</html>
